<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    
    <style>
        /* 确保背景层在最底层 */
        #vanta-halo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;  /* 关键：放在内容后面 */
        }
        
        /* 你的内容样式 */
        .content {
            position: relative;
            z-index: 1;
            color: white;
            padding: 50px;
            text-align: center;
        }
        
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Halo 背景容器 -->
    <div id="vanta-halo"></div>
    
    <!-- 你的页面内容 -->
    <div class="content">
        <h1>✨ 欢迎来到我的网站</h1>
        <p>移动鼠标查看 Halo 光晕效果</p>
    </div>
    
    <!-- 引入 Vanta.js 依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
    
    <!-- 初始化 Halo 效果 -->
    <script>
        // 等待页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            VANTA.HALO({
                el: "#vanta-halo",              // 绑定元素
                mouseControls: true,            // 鼠标交互
                touchControls: true,            // 触摸交互
                gyroControls: false,            // 陀螺仪（移动端）
                minHeight: 200.00,              // 最小高度
                minWidth: 200.00,               // 最小宽度
                
                // 🎨 你自定义的参数
                backgroundColor: 0x131a43,      // 背景色（深蓝色）
                baseColor: 0x001a59,            // 光晕基色（修复了格式）
                size: 2.5,                      // 光晕大小
                amplitudeFactor: 2.9,           // 波动强度
                xOffset: 0,                     // X 轴偏移
                yOffset: 0                      // Y 轴偏移
            });
        });
    </script>
</body>
</html>
