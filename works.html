<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai, max-image-preview:none">
  <title>Works · Si Wu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/works.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo"><a href="index.html">Si Wu</a></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="works.html" class="active">Works</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="exhibition.html">Exhibitions</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="works-page">
    <div class="filter-bar">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="painting">Painting</button>
        <button class="filter-btn" data-filter="mixed-media">Mixed Media</button>
        <button class="filter-btn" data-filter="sculpture">Sculpture</button>
        <button class="filter-btn" data-filter="video">Video</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter-series="all">All Series</button>
        <button class="filter-btn" data-filter-series="female divinity">Female Divinity</button>
        <button class="filter-btn" data-filter-series="quantum refraction">Quantum Refreaction</button>
      </div>
    </div>

    <div class="worksGrid" id="worksGrid">
      <!-- JS will populate works here -->
    </div>
  </section>
</main>

<!-- Modal / Unsplash-style popup -->
<div id="worksModal" class="works-modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    
    <div id="modal-left" class="modal-left">
      <h2 id="modal-title"></h2>
      <p id="modal-year"></p>
      <p id="modal-type"></p>
      <p id="modal-medium"></p>
      <p id="modal-size"></p>
      <p id="modal-desc"></p>
      </div>
  <div class="modal-right">
    <div id="modal-media"></div>
  </div>
  
</div>
</div>

<footer class="site-footer">
  <p>© 2025 Si Wu · Artist portfolio</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="js/works.js"></script>
</body>
</html>
