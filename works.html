<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noai, noimageai, max-image-preview:none">
  <title>Works · Si Wu</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/works.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo"><a href="index.html">Si Wu</a></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="works.html" class="active">Works</a></li>
        <li><a href="exhibition.html">Exhibitions</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="works-page">
    <div class="works-nav-wrapper">
    <div class="filter-bar" id="filterBar"></div>   
    <div class="group">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
        <g>
          <path d="M21.53 20.47l-3.66-3.66C19.19 15.35 20 13.77 20 12c0-4.41-3.59-8-8-8s-8 3.59-8 8 3.59 8 8 8c1.77 0 3.35-.81 4.81-2.13l3.66 3.66c.15.15.35.22.53.22s.38-.07.53-.22c.29-.29.29-.77 0-1.06zM5.5 12c0-3.58 2.92-6.5 6.5-6.5s6.5 2.92 6.5 6.5-2.92 6.5-6.5 6.5-6.5-2.92-6.5-6.5z"></path>
        </g>
      </svg>
      <input 
        id="works-search" 
        class="input" 
        type="search" 
        placeholder="Search..." 
        name="searchbar"
      >
    </div>
  </div>
   
    <div class="worksGrid" id="worksGrid">
      <!-- JS will populate works here -->
    </div>
  </section>
</main>

<!-- Modal / Unsplash-style popup -->
<div id="worksModal" class="works-modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    
    <div id="modal-left" class="modal-left">
      <h2 id="modal-title"></h2>
      <p id="modal-year"></p>
      <p id="modal-type"></p>
      <p id="modal-medium"></p>
      <p id="modal-size"></p>
      <p id="modal-desc"></p>
      </div>
  <div class="modal-right">
    <div id="modal-media"></div>
  </div>
  
</div>
</div>

<footer class="site-footer">
  <p>© 2025 Si Wu · Artist portfolio</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="js/works.js"></script>
</body>
</html>
